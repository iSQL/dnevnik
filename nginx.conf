server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/manifest+json;

    # Hashed Vite assets — safe to cache aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Service worker + manifest must revalidate on every load so PWA updates roll out.
    location = /sw.js                 { add_header Cache-Control "no-cache"; try_files $uri =404; }
    location = /registerSW.js         { add_header Cache-Control "no-cache"; try_files $uri =404; }
    location = /workbox-*.js          { add_header Cache-Control "no-cache"; try_files $uri =404; }
    location = /manifest.webmanifest  { add_header Cache-Control "no-cache"; types { } default_type application/manifest+json; try_files $uri =404; }

    # HashRouter means deep links always resolve to index.html — fallback handles /anything.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
