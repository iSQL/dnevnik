<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Dnevnik — Daily Life Improvement</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css"/>
<style>@keyframes blink{50%{opacity:0}}</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="screens/home.jsx"></script>
<script type="text/babel" src="screens/fitness.jsx"></script>
<script type="text/babel" src="screens/add-task.jsx"></script>
<script type="text/babel" src="screens/stats.jsx"></script>
<script type="text/babel" src="screens/achievements.jsx"></script>
<script type="text/babel" src="screens/recap.jsx"></script>
<script type="text/babel" src="screens/quests.jsx"></script>

<script type="text/babel">
const SCREEN_W = 390, SCREEN_H = 780;

function App() {
  return (
    <DesignCanvas>
      <DCSection id="overview" title="Dnevnik" subtitle="A gamified daily life improvement app · mobile first · playful & deadpan">
        <DCArtboard id="home"    label="01 · Home dashboard"      width={SCREEN_W} height={SCREEN_H}><HomeScreen/></DCArtboard>
        <DCArtboard id="quests"  label="02 · Quests"                width={SCREEN_W} height={SCREEN_H}><QuestsScreen/></DCArtboard>
        <DCArtboard id="fitness" label="03 · Category (Fitness)"  width={SCREEN_W} height={SCREEN_H}><FitnessScreen/></DCArtboard>
        <DCArtboard id="add"     label="04 · Add / check-off"     width={SCREEN_W} height={SCREEN_H}><AddTaskScreen/></DCArtboard>
        <DCArtboard id="stats"   label="05 · Stats / Profile"     width={SCREEN_W} height={SCREEN_H}><StatsScreen/></DCArtboard>
        <DCArtboard id="ach"     label="06 · Trophy Room"         width={SCREEN_W} height={SCREEN_H}><AchievementsScreen/></DCArtboard>
        <DCArtboard id="recap"   label="07 · Weekly Recap"        width={SCREEN_W} height={SCREEN_H}><RecapScreen/></DCArtboard>
        <DCPostIt top={120} left={40} rotate={-3} width={200}>
          Click any screen to focus it fullscreen. ←/→ to navigate. Esc to exit.
        </DCPostIt>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
